<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenTestament</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #0a0f14, #0d1b1f);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
        }

        img {
            width: 200px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 48px;
            margin: 10px 0;
            color: #3cff7f;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #3cff7f;
        }

        h2 {
            font-size: 20px;
            font-weight: normal;
            color: #aaa;
        }

        .box {
            margin-top: 30px;
            padding: 25px;
            border: 1px solid #1f3a3a;
            border-radius: 10px;
            background: rgba(0, 255, 150, 0.05);
        }

        .status {
            color: #3cff7f;
            font-weight: bold;
            font-size: 36px;
            text-shadow: 0 0 15px #3cff7f;
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- LOGO -->
    <img src="IMG_0058.png" alt="GreenTestament Logo">

    <!-- TITLE -->
    <h1>GreenTestament</h1>
    <h2>Nachhaltige Serverlösungen</h2>

    <!-- STATUS BOX -->
    <div class="box">
        <p class="status">🚧 Webseite im Aufbau 🚧</p>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        © 2026 GreenTestament
    </div>

</div>

</body>
</html>
