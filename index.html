<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenTestament</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #0d1f1a, #050a0d);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
        }

        img {
            width: 200px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(60, 255, 127, 0.4));
        }

        h1 {
            font-size: 48px;
            margin: 10px 0;
            color: #3cff7f;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(60, 255, 127, 0.5);
        }

        h2 {
            font-size: 20px;
            font-weight: normal;
            color: #aaa;
        }

        .box {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid rgba(60, 255, 127, 0.2);
            border-radius: 10px;
            background: rgba(0, 255, 150, 0.05);
            backdrop-filter: blur(5px);
        }

        .status {
            color: #3cff7f;
            font-weight: bold;
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">

    <img src="IMG_0058.png" alt="GreenTestament Logo">

    <h1>GreenTestament</h1>
    <h2>Nachhaltige Serverlösungen</h2>

    <div class="box">
        <p class="status">🚧 Webseite im Aufbau 🚧</p>
        <p>Wir arbeiten aktuell an unserer Plattform für Serververmietung.</p>
        <p>Bald kannst du hier leistungsstarke und nachhaltige Server buchen.</p>
    </div>

    <div class="footer">
        © 2026 GreenTestament
    </div>

</div>

</body>
</html>
